[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundling = "esbuild"
  included_files = ["data/**"]

# The API is served automatically by the Netlify function at
# netlify/functions/api.js (which runs server.js). No separate backend needed.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
